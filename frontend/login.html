<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login – BeanStack</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

<style>
* {
  box-sizing: border-box;
}

:root {
  --primary-dark: #2b1b14;
  --primary-light: #4a2c1f;
  --accent-gold: #ffc107;
  --accent-orange: #ff9800;
  --bg-light: #f7f3ef;
  --text-dark: #1a1a1a;
  --text-muted: #666;
  --border-light: #e0e0e0;
}

body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ===== BACKGROUND EFFECTS ===== */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 50%, rgba(255, 193, 7, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(255, 152, 0, 0.1) 0%, transparent 50%);
  pointer-events: none;
  z-index: 1;
}

body::after {
  content: '';
  position: fixed;
  bottom: -50%;
  right: -50%;
  width: 200%;
  height: 200%;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
  opacity: 0.5;
}

.login-container {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 460px;
  padding: 20px;
  animation: slideInUp 0.8s ease-out;
}

@keyframes slideInUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.login-card {
  background: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  box-shadow: 
    0 25px 50px rgba(0, 0, 0, 0.3),
    0 0 1px rgba(255, 193, 7, 0.2);
  padding: 0;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

/* ===== HEADER ===== */
.login-header {
  background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
  color: #fff;
  padding: 2.5rem 2rem;
  text-align: center;
  position: relative;
}

.login-header::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: radial-gradient(circle at 50% 0%, rgba(255, 193, 7, 0.1) 0%, transparent 70%);
  pointer-events: none;
}

.login-header-content {
  position: relative;
  z-index: 2;
}

.logo-circle {
  width: 70px;
  height: 70px;
  background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-orange) 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1rem;
  font-size: 2rem;
  box-shadow: 0 10px 25px rgba(255, 193, 7, 0.3);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

.login-header h2 {
  font-size: 1.8rem;
  font-weight: 700;
  margin: 0;
  letter-spacing: 0.5px;
  word-spacing: 0.2em;
}

.login-header p {
  margin: 0.5rem 0 0 0;
  opacity: 0.9;
  font-size: 0.9rem;
  letter-spacing: 0.3px;
}

/* ===== FORM BODY ===== */
.login-body {
  padding: 2.5rem 2rem;
}

.form-group {
  margin-bottom: 1.8rem;
  animation: slideInRight 0.6s ease-out backwards;
}

.form-group:nth-child(1) { animation-delay: 0.2s; }
.form-group:nth-child(2) { animation-delay: 0.3s; }
.form-group:nth-child(3) { animation-delay: 0.4s; }

@keyframes slideInRight {
  from {
    opacity: 0;
    transform: translateX(-20px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

.form-label {
  display: block;
  font-weight: 600;
  color: var(--primary-dark);
  margin-bottom: 0.6rem;
  font-size: 0.95rem;
  letter-spacing: 0.3px;
}

.form-control {
  border: 2px solid var(--border-light);
  border-radius: 10px;
  padding: 0.9rem 1rem;
  font-size: 0.95rem;
  transition: all 0.3s ease;
  background: #fff;
  color: var(--text-dark);
}

.form-control:focus {
  border-color: var(--accent-gold);
  box-shadow: 0 0 0 4px rgba(255, 193, 7, 0.15);
  outline: none;
  background: #fff;
}

.form-control::placeholder {
  color: #bbb;
}

.form-control:hover:not(:focus) {
  border-color: #ccc;
}

/* ===== REMEMBER & FORGOT ===== */
.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  font-size: 0.9rem;
  animation: slideInRight 0.6s ease-out 0.5s backwards;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  cursor: pointer;
}

.remember-me input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
  accent-color: var(--accent-gold);
}

.forgot-link {
  color: var(--accent-gold);
  text-decoration: none;
  font-weight: 500;
  transition: color 0.3s ease;
}

.forgot-link:hover {
  color: var(--accent-orange);
  text-decoration: underline;
}

/* ===== LOGIN BUTTON ===== */
.btn-login {
  width: 100%;
  padding: 1rem;
  background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-orange) 100%);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
  animation: slideInRight 0.6s ease-out 0.6s backwards;
}

.btn-login::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(255, 255, 255, 0.2);
  transition: left 0.3s ease;
  z-index: 1;
}

.btn-login:hover::before {
  left: 100%;
}

.btn-login:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(255, 193, 7, 0.4);
}

.btn-login:active {
  transform: translateY(-1px);
  box-shadow: 0 5px 15px rgba(255, 193, 7, 0.3);
}

.btn-login:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.btn-login span {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.spinner {
  display: none;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.btn-login:disabled .spinner {
  display: inline-block;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ===== DIVIDER ===== */
.divider-text {
  text-align: center;
  margin: 1.5rem 0;
  color: var(--text-muted);
  font-size: 0.85rem;
  animation: slideInRight 0.6s ease-out 0.7s backwards;
}

/* ===== SIGNUP SECTION ===== */
.signup-section {
  background: #f9f7f4;
  padding: 1.5rem 2rem;
  text-align: center;
  border-top: 1px solid var(--border-light);
  animation: slideInUp 0.8s ease-out 0.8s backwards;
}

.signup-section p {
  margin: 0;
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 0.5rem;
}

.signup-link {
  color: var(--accent-gold);
  text-decoration: none;
  font-weight: 700;
  transition: color 0.3s ease;
  display: inline;
}

.signup-link:hover {
  color: var(--accent-orange);
}

/* ===== DEMO CREDENTIALS ===== */
.demo-info {
  background: linear-gradient(135deg, rgba(255, 193, 7, 0.1) 0%, rgba(255, 152, 0, 0.05) 100%);
  border-left: 4px solid var(--accent-gold);
  padding: 1rem;
  border-radius: 8px;
  margin-top: 1.5rem;
  font-size: 0.85rem;
  color: var(--text-muted);
  animation: slideInUp 0.8s ease-out 0.9s backwards;
}

.demo-info strong {
  color: var(--primary-dark);
  display: block;
  margin-bottom: 0.5rem;
}

.demo-info code {
  background: rgba(0, 0, 0, 0.05);
  padding: 0.2rem 0.4rem;
  border-radius: 3px;
  font-family: 'Courier New', monospace;
  color: var(--primary-dark);
}

/* ===== ERROR MESSAGES ===== */
.error-message {
  display: none;
  background: #fee;
  color: #c41e3a;
  padding: 1rem;
  border-radius: 10px;
  margin-bottom: 1.5rem;
  border-left: 4px solid #c41e3a;
  font-size: 0.9rem;
  animation: shake 0.5s ease-in-out;
}

.error-message.show {
  display: block;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  .login-container {
    max-width: 100%;
    padding: 10px;
  }

  .login-card {
    border-radius: 15px;
  }

  .login-header {
    padding: 2rem 1.5rem;
  }

  .login-header h2 {
    font-size: 1.5rem;
  }

  .login-body {
    padding: 2rem 1.5rem;
  }

  .form-options {
    flex-direction: column;
    align-items: flex-start;
    gap: 1rem;
  }

  .logo-circle {
    width: 60px;
    height: 60px;
    font-size: 1.8rem;
  }
}

/* ===== ACCESSIBILITY ===== */
@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

@media (prefers-color-scheme: dark) {
  .form-control {
    background: #2a2a2a;
    color: #fff;
    border-color: #444;
  }

  .form-control:focus {
    background: #333;
  }

  .login-header p,
  .signup-section p,
  .demo-info {
    color: #aaa;
  }

  .signup-section {
    background: #1f1f1f;
    border-top-color: #444;
  }
}
</style>
</head>

<body>

<div class="login-container">
  <div class="login-card">
    
    <!-- ===== HEADER ===== -->
    <div class="login-header">
      <div class="login-header-content">
        <div class="logo-circle">☕</div>
        <h2>BeanStack</h2>
        <p>Welcome Back, Coffee Lover</p>
      </div>
    </div>

    <!-- ===== FORM ===== -->
    <div class="login-body">
      <div class="error-message" id="errorMessage"></div>

      <form id="loginForm">
        
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            class="form-control" 
            placeholder="your@email.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-control" 
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          >
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" autocomplete="off">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link" onclick="handleForgot(event)">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span>
            <span class="spinner"></span>
            <span id="btnText">Login</span>
          </span>
        </button>
      </form>

      <div class="divider-text">New to BeanStack?</div>

      <!-- ===== SIGNUP ===== -->
      <div class="signup-section">
        <p>
          Create an account and start ordering <br>
          <a href="#" class="signup-link" onclick="handleSignup(event)">Sign up now</a>
        </p>
      </div>

      <!-- ===== DEMO INFO ===== -->
      <div class="demo-info">
        <strong>🧪 Demo Credentials:</strong>
        Email: <code>admin@gmail.com</code><br>
        Password: <code>1234</code>
      </div>

    </div>
  </div>
</div>

<!-- ===== SCRIPTS ===== -->
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<!-- Backend Integration -->
<script src="api.js"></script>
<script src="auth.js"></script>

<script>
// ===== LOGIN HANDLER =====
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorMessage = document.getElementById('errorMessage');
  const loginBtn = document.getElementById('loginBtn');
  const btnText = document.getElementById('btnText');

  // Reset error
  errorMessage.classList.remove('show');

  // Validation
  if (!email || !password) {
    showError(errorMessage, '❌ Please fill in all fields');
    return;
  }

  if (!isValidEmail(email)) {
    showError(errorMessage, '❌ Please enter a valid email address');
    return;
  }

  // Show loading state
  loginBtn.disabled = true;
  btnText.textContent = 'Logging in...';

  try {
    // Try backend login
    const response = await handleLogin(email, password);
    
    if (response.success) {
      if (document.getElementById('rememberMe').checked) {
        localStorage.setItem('rememberEmail', email);
      }

      showSuccess('✅ Login successful! Redirecting...');
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
    }
  } catch (error) {
    loginBtn.disabled = false;
    btnText.textContent = 'Login';
    showError(errorMessage, `❌ ${error.message || 'Invalid credentials'}`);
  }
});

// ===== SIGNUP HANDLER =====
function handleSignup(e) {
  e.preventDefault();
  showToast('🚀 Redirecting to signup...', '#ffc107', '#000');
  setTimeout(() => {
    // Show inline signup form
    const loginForm = document.getElementById('loginForm');
    const parent = loginForm.parentElement;
    parent.innerHTML = `
      <div class="signup-container">
        <h4 class="text-white mb-4">Create Your Account</h4>
        <div class="error-message" id="signupError"></div>
        <form id="signupForm">
          <div class="form-group">
            <label class="form-label" for="signupName">Full Name</label>
            <input type="text" id="signupName" class="form-control" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signupEmailInput">Email Address</label>
            <input type="email" id="signupEmailInput" class="form-control" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signupPasswordInput">Password</label>
            <input type="password" id="signupPasswordInput" class="form-control" placeholder="Enter password" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signupConfirmPassword">Confirm Password</label>
            <input type="password" id="signupConfirmPassword" class="form-control" placeholder="Confirm password" required>
          </div>
          <button type="submit" class="btn-login w-100">Sign Up</button>
          <div class="divider-text">Already have an account?</div>
          <button type="button" class="btn btn-outline-light w-100" onclick="goBackToLogin()">Back to Login</button>
        </form>
      </div>
    `;
    
    document.getElementById('signupForm').addEventListener('submit', submitSignup);
  }, 500);
}

// ===== SIGNUP SUBMIT =====
async function submitSignup(e) {
  e.preventDefault();
  
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmailInput').value.trim();
  const password = document.getElementById('signupPasswordInput').value.trim();
  const confirmPassword = document.getElementById('signupConfirmPassword').value.trim();
  const errorMessage = document.getElementById('signupError');

  if (!name || !email || !password || !confirmPassword) {
    showError(errorMessage, '❌ Please fill in all fields');
    return;
  }

  if (!isValidEmail(email)) {
    showError(errorMessage, '❌ Please enter a valid email');
    return;
  }

  if (password !== confirmPassword) {
    showError(errorMessage, '❌ Passwords do not match');
    return;
  }

  if (password.length < 6) {
    showError(errorMessage, '❌ Password must be at least 6 characters');
    return;
  }

  try {
    const response = await handleRegister(name, email, password, confirmPassword);
    
    if (response.success) {
      showSuccess('✅ Account created! Redirecting...');
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
    }
  } catch (error) {
    showError(errorMessage, `❌ ${error.message || 'Registration failed'}`);
  }
}

// ===== GO BACK TO LOGIN =====
function goBackToLogin() {
  location.reload();
}

// ===== UTILITIES =====
function isValidEmail(email) {
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return emailRegex.test(email);
}

function showError(element, message) {
  element.textContent = message;
  element.classList.add('show');
  element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showSuccess(message) {
  showToast(message, '#28a745', '#fff');
}

function showToast(text, bg, color) {
  if (typeof Toastify !== 'undefined') {
    Toastify({
      text: text,
      duration: 2000,
      gravity: 'top',
      position: 'right',
      style: {
        background: bg,
        color: color,
        fontWeight: 'bold'
      }
    }).showToast();
  } else {
    alert(text);
  }
}

function handleForgot(e) {
  e.preventDefault();
  showToast('📧 Password reset feature coming soon!', '#17a2b8', '#fff');
}

// ===== POPULATE REMEMBERED EMAIL =====
window.addEventListener('DOMContentLoaded', () => {
  const rememberedEmail = localStorage.getItem('rememberEmail');
  if (rememberedEmail) {
    document.getElementById('email').value = rememberedEmail;
    document.getElementById('rememberMe').checked = true;
    document.getElementById('password').focus();
  } else {
    document.getElementById('email').focus();
  }
});

// ===== CLEAR ERROR ON INPUT =====
document.getElementById('email').addEventListener('input', () => {
  document.getElementById('errorMessage').classList.remove('show');
});

document.getElementById('password').addEventListener('input', () => {
  document.getElementById('errorMessage').classList.remove('show');
});
</script>

</body>
</html>
